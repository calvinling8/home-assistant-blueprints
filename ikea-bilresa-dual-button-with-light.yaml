blueprint:
  name: IKEA BILRESA Dual Button with Light
  description: IKEA BILRESA dual button automation with smooth dimming.
  domain: automation
  author: Calvin Ling
  homeassistant:
    min_version: "2024.6.0"

  input:
    light:
      name: Light
      input:
        light_entity:
          name: Light
          description: The light to control.
          selector:
            entity:
              domain: light
        max_transition_duration:
          name: 0% to 100% Transition Duration
          description: >-
            How long it should take to transition from 0% to 100% brightness.
          default: 3
          selector:
            number:
              min: 1
              max: 15
              step: 1
              unit_of_measurement: s
        min_brightness:
          name: Minimum brightness
          description: >-
            The brightness to consider as the minimum. The light will not get
            dimmer than this value.
          default: 1
          selector:
            number:
              min: 0
              max: 255
              step: 1
        max_brightness:
          name: Maximum brightness
          description: >-
            The brightness to consider as the maximum. The light will not get
            brighter than this value.
          default: 255
          selector:
            number:
              min: 1
              max: 255
              step: 1
    button_events:
      name: Button Events
      input:
        button1_event_entity:
          name: Button 1 Event Entity
          description: >-
            Button event entity that will be used for increasing the brightness
            when the button is held.
          selector:
            entity:
              domain: event
              device_class: button
        button2_event_entity:
          name: Button 2 Event Entity
          description: >-
            Button event entity that will be used for decreasing the brightness
            when the button is held.
          selector:
            entity:
              domain: event
              device_class: button
    button1_actions:
      name: Button 1 Actions
      collapsed: true
      input:
        button1_single_press_action:
          name: Single Press
          default:
            - action: light.toggle
              target:
                entity_id: "{{ light_entity }}"
          selector:
            action: {}
        button1_double_press_action:
          name: Double Press
          default: []
          selector:
            action: {}
    button2_actions:
      name: Button 2 Actions
      collapsed: true
      input:
        button2_single_press_action:
          name: Single Press
          default: []
          selector:
            action: {}
        button2_double_press_action:
          name: Double Press
          default: []
          selector:
            action: {}

mode: single
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input button1_event_entity
    id: button1
  - trigger: state
    entity_id: !input button2_event_entity
    id: button2

condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state is not none and trigger.to_state.state not in ['unavailable', 'unknown'] }}
  - condition: template
    value_template: >-
      {{ trigger.from_state is none or trigger.from_state.state not in ['unavailable', 'unknown'] }}


variables:
  light_entity: !input light_entity
  max_transition_duration: !input max_transition_duration
  max_brightness: !input max_brightness
  min_brightness: !input min_brightness
  brightness_range: >-
    {{ [max_brightness - min_brightness, 1] | max }}

actions:
  - variables:
      trigger_id: "{{ trigger.id }}"
      press_type: "{{ trigger.to_state.attributes.event_type | default('') }}"
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button1' and press_type == 'multi_press_1' }}
        sequence: !input button1_single_press_action
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button2' and press_type == 'multi_press_1' }}
        sequence: !input button2_single_press_action
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button1' and press_type == 'multi_press_2' }}
        sequence: !input button1_double_press_action
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button2' and press_type == 'multi_press_2' }}
        sequence: !input button2_double_press_action
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button1' and press_type == 'long_press' }}
        sequence:
          - condition: state
            state: "on"
            entity_id: !input light_entity
          - variables:
              start_time: "{{ as_timestamp(now()) }}"
              start_brightness: >-
                {{ state_attr(light_entity, 'brightness') or 0 }}
              brightness_diff_to_max: >-
                {{ [max_brightness - start_brightness, 0] | max }}
              transition_time_to_max: >-
                {{ brightness_diff_to_max / brightness_range * max_transition_duration }}
          - condition: template
            value_template: >-
              {{ transition_time_to_max > 0 }}
          - action: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: "{{ max_brightness }}"
              transition: "{{ transition_time_to_max }}"
          - wait_for_trigger:
              - trigger: state
                entity_id: !input button1_event_entity
                attribute: event_type
                to: long_release
              - trigger: state
                entity_id: !input light_entity
                not_to: "on"
            timeout: "{{ transition_time_to_max }}"
          - condition: state
            state: "on"
            entity_id: !input light_entity
          - variables:
              elapsed_time: "{{ as_timestamp(now()) - start_time }}"
              brightness_change_requested: >-
                {{ (elapsed_time / max_transition_duration * brightness_range) | int }}
          - action: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: >-
                {{ [start_brightness + brightness_change_requested, max_brightness] | min }}
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger_id == 'button2' and press_type == 'long_press' }}
        sequence:
          - condition: state
            state: "on"
            entity_id: !input light_entity
          - variables:
              start_time: "{{ as_timestamp(now()) }}"
              start_brightness: >-
                {{ state_attr(light_entity, 'brightness') or 0 }}
              brightness_difference_to_min: >-
                {{ [start_brightness - min_brightness, 0] | max }}
              transition_time_to_min: >-
                {{ brightness_difference_to_min / brightness_range * max_transition_duration }}
          - condition: template
            value_template: >-
              {{ transition_time_to_min > 0 }}
          - action: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: "{{ min_brightness }}"
              transition: "{{ transition_time_to_min }}"
          - wait_for_trigger:
              - trigger: state
                entity_id: !input button2_event_entity
                attribute: event_type
                to: long_release
              - trigger: state
                entity_id: !input light_entity
                not_to: "on"
            timeout: "{{ transition_time_to_min }}"
          - condition: state
            state: "on"
            entity_id: !input light_entity
          - variables:
              elapsed_time: "{{ as_timestamp(now()) - start_time }}"
              brightness_change_requested: >-
                {{ (-1 * elapsed_time / max_transition_duration * brightness_range) | int }}
          - action: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness: >-
                {{ [start_brightness + brightness_change_requested, min_brightness] | max }}
